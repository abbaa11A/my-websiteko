<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELYVORA Perfumes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0a0f1f;
  color: white;
  overflow-x: hidden;
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 50px;
}

.hero-text h1 {
  font-size: 60px;
  background: linear-gradient(90deg, gold, #00c6ff);
  -webkit-background-clip: text;
  color: transparent;
}

.hero-text p {
  max-width: 400px;
  opacity: 0.7;
}

.btn {
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  background: gold;
  cursor: pointer;
  font-weight: bold;
}

/* 3D Bottle */
.bottle {
  width: 250px;
  transition: 0.2s;
}

/* Products */
.products {
  padding: 50px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

/* Reviews */
.reviews {
  padding: 50px;
  text-align: center;
}

.review {
  margin: 20px;
  opacity: 0.8;
}

/* WhatsApp */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- Hero -->
<section class="hero">
  <div class="hero-text">
    <h1>ELYVORA</h1>
    <p>Luxury in Every Drop</p>
    <button class="btn">Shop Now</button>
  </div>
  <img class="bottle" id="bottle" src="https://images.unsplash.com/photo-1585386959984-a41552231658">
</section>

<!-- Products -->
<section class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">
    <h3>Golden Musk</h3>
    <p>$45</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1615634262417-7d3bba1c7b60">
    <h3>Ocean Breeze</h3>
    <p>$40</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb">
    <h3>Night Essence</h3>
    <p>$60</p>
  </div>

</section>

<!-- Reviews -->
<section class="reviews">
  <h2>⭐ Customer Reviews</h2>
  <div class="review">“Amazing quality and design!”</div>
  <div class="review">“Looks like a premium brand!”</div>
  <div class="review">“Highly recommended!”</div>
</section>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/9617146951?text=Hello%20I%20want%20to%20order%20from%20ELYVORA">💬</a>

<script>
const bottle = document.getElementById("bottle");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.pageX) / 25;
  let y = (window.innerHeight / 2 - e.pageY) / 25;
  bottle.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
